<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ParkEase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --asphalt: #1c1f24;
    --asphalt-2: #23262c;
    --steel: #3a3f47;
    --curb: #f2b705;
    --curb-dark: #c99400;
    --green: #2fbf71;
    --green-dark: #1f8a51;
    --red: #e0483e;
    --red-dark: #a83128;
    --fog: #eef0f0;
    --fog-dim: #b7bcc2;
    --text-dark: #1c1f24;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--asphalt);
    color: var(--fog);
    font-family: "Inter", Arial, sans-serif;
  }
  body {
    background-image:
      repeating-linear-gradient(90deg, transparent 0 120px, rgba(242,183,5,0.05) 120px 124px),
      repeating-linear-gradient(0deg, transparent 0 64px, rgba(255,255,255,0.025) 64px 66px);
  }
  h1, h2, h3, .display {
    font-family: "Oswald", "Arial Narrow", sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  button {
    font-family: "Inter", Arial, sans-serif;
    cursor: pointer;
    border: none;
  }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 3px solid var(--curb);
    outline-offset: 2px;
  }
  .hidden { display: none !important; }

  /* ---------- Top bar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 3px solid var(--curb);
    background: var(--asphalt-2);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-badge {
    width: 34px; height: 34px;
    background: var(--curb);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .brand h1 { font-size: 20px; margin: 0; color: var(--fog); }
  .brand span { color: var(--curb); }
  .user-chip { display: flex; align-items: center; gap: 12px; font-size: 14px; }
  .user-chip .name { color: var(--fog); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--steel);
    color: var(--fog-dim);
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 13px;
  }
  .btn-ghost:hover { border-color: var(--curb); color: var(--curb); }

  /* ---------- Auth screen ---------- */
  .auth-wrap {
    min-height: calc(100vh - 68px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .ticket {
    width: 100%;
    max-width: 380px;
    background: var(--fog);
    color: var(--text-dark);
    border-radius: 14px;
    position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.45);
  }
  .ticket::before, .ticket::after {
    content: "";
    position: absolute;
    width: 26px; height: 26px;
    background: var(--asphalt);
    border-radius: 50%;
    top: 50%;
    transform: translateY(-50%);
  }
  .ticket::before { left: -13px; }
  .ticket::after { right: -13px; }
  .ticket-inner { padding: 30px 30px 26px; }
  .ticket h2 { font-size: 22px; margin: 0 0 4px; }
  .ticket .sub { font-size: 13px; color: #666; margin: 0 0 20px; }

  .tabs {
    display: flex;
    background: #e2e4e2;
    border-radius: 8px;
    padding: 4px;
    margin-bottom: 20px;
  }
  .tabs button {
    flex: 1;
    background: transparent;
    padding: 9px 0;
    border-radius: 6px;
    font-weight: 600;
    font-size: 13px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .tabs button.active { background: var(--asphalt); color: var(--curb); }

  label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #777;
    margin: 12px 0 5px;
  }
  input[type=text], input[type=email], input[type=password], input[type=number] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d7d5cf;
    border-radius: 7px;
    font-size: 14px;
    font-family: inherit;
  }
  .btn-primary {
    width: 100%;
    margin-top: 20px;
    background: var(--curb);
    color: var(--text-dark);
    font-weight: 700;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .btn-primary:hover { background: var(--curb-dark); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg {
    margin-top: 14px;
    font-size: 12.5px;
    padding: 9px 11px;
    border-radius: 6px;
  }
  .msg.err { background: #fdecea; color: #a83128; }
  .msg.ok { background: #e6f4ea; color: #1f8a51; }

  /* ---------- Dashboard ---------- */
  .dash { max-width: 1000px; margin: 0 auto; padding: 28px; }
  .dash-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; }
  .dash-head h2 { font-size: 15px; color: var(--fog-dim); margin: 0; }

  .type-tabs { display: flex; gap: 8px; margin-bottom: 22px; }
  .type-tab {
    background: var(--asphalt-2);
    border: 1px solid var(--steel);
    color: var(--fog-dim);
    padding: 9px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    display: flex; align-items: center; gap: 7px;
  }
  .type-tab.active { background: var(--curb); border-color: var(--curb); color: var(--text-dark); }

  .legend { display: flex; gap: 18px; margin-bottom: 16px; font-size: 12.5px; color: var(--fog-dim); }
  .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; }
  .dot.g { background: var(--green); }
  .dot.r { background: var(--red); }

  .lot {
    background: var(--asphalt-2);
    border: 1px solid var(--steel);
    border-radius: 12px;
    padding: 24px;
  }
  .bay-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 14px;
  }
  .bay {
    position: relative;
    aspect-ratio: 3 / 4;
    border-radius: 8px;
    border: 3px dashed rgba(255,255,255,0.55);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-weight: 700;
    font-family: "Oswald", sans-serif;
    letter-spacing: 0.03em;
  }
  .bay.open {
    background: var(--green);
    color: #0d3b23;
  }
  .bay.open:hover { background: var(--green-dark); cursor: pointer; transform: translateY(-2px); }
  .bay.full {
    background: var(--red);
    color: #4a0e09;
    cursor: not-allowed;
  }
  .bay .slot-label { font-size: 15px; }
  .bay .status { font-size: 9.5px; text-transform: uppercase; opacity: 0.85; letter-spacing: 0.08em; }
  .bay svg { width: 34px; height: 34px; }

  .empty-note { color: var(--fog-dim); font-size: 13px; padding: 20px; text-align: center; }

  /* ---------- Active booking strip ---------- */
  .active-strip {
    margin-top: 22px;
    background: var(--asphalt-2);
    border: 1px solid var(--curb);
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .active-strip .info { font-size: 13.5px; color: var(--fog-dim); }
  .active-strip .info b { color: var(--curb); }
  .btn-end {
    background: var(--red);
    color: #fff;
    font-weight: 700;
    padding: 10px 18px;
    border-radius: 7px;
    font-size: 13px;
    text-transform: uppercase;
  }
  .btn-end:hover { background: var(--red-dark); }

  /* ---------- Modal overlay (booking + receipts) ---------- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    z-index: 50;
  }
  .modal {
    background: var(--fog);
    color: var(--text-dark);
    border-radius: 12px;
    width: 100%; max-width: 420px;
    padding: 26px;
    position: relative;
  }
  .modal .close {
    position: absolute; top: 14px; right: 14px;
    background: transparent; color: #999; font-size: 18px; padding: 4px 8px;
  }
  .modal h3 { font-size: 18px; margin: 0 0 4px; }
  .modal .sub { font-size: 13px; color: #666; margin: 0 0 18px; }

  .duration-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .chip {
    background: #e2e4e2;
    color: #444;
    padding: 7px 13px;
    border-radius: 16px;
    font-size: 12.5px;
    font-weight: 600;
  }
  .chip.active { background: var(--asphalt); color: var(--curb); }

  /* Email-style receipt card, reused for on-screen confirmation/bill */
  .receipt-card { border: 1px solid #e0e0e0; border-radius: 10px; overflow: hidden; }
  .receipt-header { padding: 18px; text-align: center; color: #fff; }
  .receipt-header.blue { background: #1a73e8; }
  .receipt-header.green { background: #188038; }
  .receipt-header h2 { margin: 0; font-size: 17px; text-transform: none; letter-spacing: 0; font-family: "Inter", sans-serif; font-weight: 700; }
  .receipt-body { padding: 20px; background: #fff; }
  .receipt-body p { font-size: 14px; color: #444; margin: 0 0 12px; }
  .receipt-table { width: 100%; border-collapse: collapse; }
  .receipt-table td { padding: 9px 0; border-bottom: 1px solid #eee; font-size: 13px; }
  .receipt-table td:first-child { color: #777; }
  .receipt-table td:last-child { text-align: right; font-weight: 600; color: #222; }
  .receipt-table tr.total td { background: #e6f4ea; color: #188038; font-weight: 700; border-top: 2px solid #188038; padding: 12px 8px; }
  .receipt-table tr.total td:last-child { font-size: 16px; }
  .modal .btn-primary { margin-top: 20px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-badge">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M4 16l1.5-5A2 2 0 0 1 7.4 9.5h9.2A2 2 0 0 1 18.5 11l1.5 5" stroke="#1c1f24" stroke-width="2" stroke-linecap="round"/>
        <rect x="3" y="16" width="18" height="4" rx="1.5" fill="#1c1f24"/>
        <circle cx="7" cy="20" r="1.4" fill="#f2b705"/>
        <circle cx="17" cy="20" r="1.4" fill="#f2b705"/>
      </svg>
    </div>
    <h1>Park<span>Ease</span></h1>
  </div>
  <div class="user-chip hidden" id="user-chip">
    <span class="name">Hi, <b id="user-name-label"></b></span>
    <button class="btn-ghost" id="btn-logout">Log out</button>
  </div>
</div>

<!-- ===================== AUTH SCREEN ===================== -->
<div class="auth-wrap" id="auth-screen">
  <div class="ticket">
    <div class="ticket-inner">
      <h2>Welcome to ParkEase</h2>
      <p class="sub">Find a spot. Park. Pay when you leave.</p>

      <div class="tabs">
        <button id="tab-login" class="active">Log in</button>
        <button id="tab-signup">Sign up</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="form-login">
        <label for="li-email">Email</label>
        <input type="email" id="li-email" placeholder="you@example.com">
        <label for="li-password">Password</label>
        <input type="password" id="li-password" placeholder="••••••••">
        <button class="btn-primary" id="btn-login">Log in</button>
        <div class="msg hidden" id="login-msg"></div>
      </div>

      <!-- SIGNUP FORM -->
      <div id="form-signup" class="hidden">
        <label for="su-name">Name</label>
        <input type="text" id="su-name" placeholder="Your name">
        <label for="su-email">Email</label>
        <input type="email" id="su-email" placeholder="you@example.com">
        <label for="su-phone">Phone (optional)</label>
        <input type="text" id="su-phone" placeholder="9999999999">
        <label for="su-password">Password</label>
        <input type="password" id="su-password" placeholder="Choose a password">
        <button class="btn-primary" id="btn-signup">Create account</button>
        <div class="msg hidden" id="signup-msg"></div>
      </div>
    </div>
  </div>
</div>

<!-- ===================== DASHBOARD ===================== -->
<div class="dash hidden" id="dashboard">
  <div class="dash-head">
    <h2>Available Bays</h2>
  </div>

  <div class="type-tabs" id="type-tabs">
    <button class="type-tab active" data-type="CAR">🚗 Car</button>
    <button class="type-tab" data-type="BIKE">🏍️ Bike</button>
    <button class="type-tab" data-type="TRUCK">🚚 Truck</button>
  </div>

  <div class="legend">
    <span><span class="dot g"></span>Available</span>
    <span><span class="dot r"></span>Occupied</span>
  </div>

  <div class="lot">
    <div class="bay-grid" id="bay-grid"></div>
  </div>

  <div class="active-strip hidden" id="active-strip">
    <div class="info">Currently parked in <b id="active-slot"></b> · since <b id="active-since"></b></div>
    <button class="btn-end" id="btn-end">End Parking &amp; Get Bill</button>
  </div>
</div>

<!-- ===================== BOOKING MODAL ===================== -->
<div class="overlay hidden" id="booking-overlay">
  <div class="modal">
    <button class="close" id="booking-close">&times;</button>
    <h3>Book Slot <span id="booking-slot-label"></span></h3>
    <p class="sub">Enter your vehicle and how long you'll need it.</p>

    <label for="bk-vnum">Vehicle number</label>
    <input type="text" id="bk-vnum" placeholder="e.g. TS09AB1234">

    <label>How long do you need?</label>
    <div class="duration-chips" id="duration-chips">
      <button class="chip" data-mins="30">30 min</button>
      <button class="chip active" data-mins="60">1 hr</button>
      <button class="chip" data-mins="120">2 hr</button>
      <button class="chip" data-mins="240">4 hr</button>
    </div>

    <button class="btn-primary" id="btn-confirm-booking">Confirm Booking</button>
    <div class="msg hidden" id="booking-msg"></div>
  </div>
</div>

<!-- ===================== RECEIPT MODAL ===================== -->
<div class="overlay hidden" id="receipt-overlay">
  <div class="modal">
    <button class="close" id="receipt-close">&times;</button>
    <div id="receipt-content"></div>
    <button class="btn-primary" id="receipt-done">Done</button>
  </div>
</div>

<script>
const API_BASE = "";
let selectedType = "CAR";
let selectedDuration = 60;
let pendingSlot = null;

function getUser() {
  const raw = localStorage.getItem("pe_user");
  return raw ? JSON.parse(raw) : null;
}
function setUser(u) { localStorage.setItem("pe_user", JSON.stringify(u)); }
function clearUser() { localStorage.removeItem("pe_user"); }

let activeBooking = null;

async function loadActiveBooking() {
  const user = getUser();
  try {
    const data = await api(`/api/bookings/active/${user.userId}`, "GET");
    activeBooking = data.active === false ? null : data;
  } catch (err) {
    activeBooking = null;
  }
  refreshActiveStrip();
}

async function api(path, method, body) {
  const res = await fetch(API_BASE + path, {
    method,
    headers: body ? { "Content-Type": "application/json" } : undefined,
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);
  return data;
}

function showMsg(id, ok, text) {
  const el = document.getElementById(id);
  el.className = "msg " + (ok ? "ok" : "err");
  el.textContent = text;
}

function carIconSvg(fill) {
  return `<svg viewBox="0 0 24 24" fill="none">
    <rect x="6" y="3" width="12" height="18" rx="3" fill="${fill}"/>
    <rect x="8" y="6" width="8" height="5" rx="1" fill="rgba(0,0,0,0.25)"/>
    <circle cx="8.5" cy="20" r="1.1" fill="rgba(0,0,0,0.35)"/>
    <circle cx="15.5" cy="20" r="1.1" fill="rgba(0,0,0,0.35)"/>
  </svg>`;
}

/* ---------------- Auth screen wiring ---------------- */
document.getElementById("tab-login").addEventListener("click", () => {
  document.getElementById("tab-login").classList.add("active");
  document.getElementById("tab-signup").classList.remove("active");
  document.getElementById("form-login").classList.remove("hidden");
  document.getElementById("form-signup").classList.add("hidden");
});
document.getElementById("tab-signup").addEventListener("click", () => {
  document.getElementById("tab-signup").classList.add("active");
  document.getElementById("tab-login").classList.remove("active");
  document.getElementById("form-signup").classList.remove("hidden");
  document.getElementById("form-login").classList.add("hidden");
});

document.getElementById("btn-signup").addEventListener("click", async () => {
  const body = {
    name: document.getElementById("su-name").value.trim(),
    email: document.getElementById("su-email").value.trim(),
    phone: document.getElementById("su-phone").value.trim(),
    password: document.getElementById("su-password").value
  };
  if (!body.name || !body.email || !body.password) {
    showMsg("signup-msg", false, "Name, email and password are required.");
    return;
  }
  try {
    await api("/api/auth/signup", "POST", body);
    showMsg("signup-msg", true, "Account created. Switch to Log in.");
    document.getElementById("li-email").value = body.email;
    document.getElementById("tab-login").click();
  } catch (err) {
    showMsg("signup-msg", false, err.message);
  }
});

document.getElementById("btn-login").addEventListener("click", async () => {
  const body = {
    email: document.getElementById("li-email").value.trim(),
    password: document.getElementById("li-password").value
  };
  try {
    const user = await api("/api/auth/login", "POST", body);
    setUser(user);
    enterDashboard();
  } catch (err) {
    showMsg("login-msg", false, err.message);
  }
});

document.getElementById("btn-logout").addEventListener("click", () => {
  clearUser();
  location.reload();
});

/* ---------------- Dashboard ---------------- */
function enterDashboard() {
  const user = getUser();
  document.getElementById("auth-screen").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
  document.getElementById("user-chip").classList.remove("hidden");
  document.getElementById("user-name-label").textContent = user.name;
  loadActiveBooking();
  loadSlots();
}

document.querySelectorAll(".type-tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".type-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    selectedType = btn.dataset.type;
    loadSlots();
  });
});

async function loadSlots() {
  const grid = document.getElementById("bay-grid");
  grid.innerHTML = `<div class="empty-note">Loading bays…</div>`;
  try {
    const slots = await api(`/api/slots?type=${selectedType}`, "GET");
    if (!slots.length) {
      grid.innerHTML = `<div class="empty-note">No ${selectedType.toLowerCase()} bays configured yet.</div>`;
      return;
    }
    grid.innerHTML = "";
    slots.forEach(slot => {
      const bay = document.createElement("div");
      bay.className = "bay " + (slot.occupied ? "full" : "open");
      bay.innerHTML = slot.occupied
        ? `${carIconSvg("#4a0e09")}<span class="slot-label">${slot.slotNumber}</span><span class="status">Occupied</span>`
        : `<span class="slot-label">${slot.slotNumber}</span><span class="status">Available</span>`;
      if (!slot.occupied) {
        bay.addEventListener("click", () => openBookingModal(slot));
      }
      grid.appendChild(bay);
    });
  } catch (err) {
    grid.innerHTML = `<div class="empty-note">Couldn't load bays: ${err.message}</div>`;
  }
}

function refreshActiveStrip() {
  const strip = document.getElementById("active-strip");
  if (activeBooking) {
    strip.classList.remove("hidden");
    document.getElementById("active-slot").textContent = activeBooking.slotNumber;
    document.getElementById("active-since").textContent =
      new Date(activeBooking.entryTime).toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
  } else {
    strip.classList.add("hidden");
  }
}

/* ---------------- Booking modal ---------------- */
function openBookingModal(slot) {
  if (activeBooking) {
    alert("You already have an active booking. Please checkout first.");
    return;
  }
  pendingSlot = slot;
  document.getElementById("booking-slot-label").textContent = slot.slotNumber;
  document.getElementById("bk-vnum").value = "";
  document.getElementById("booking-msg").classList.add("hidden");
  document.getElementById("booking-overlay").classList.remove("hidden");
}
document.getElementById("booking-close").addEventListener("click", () => {
  document.getElementById("booking-overlay").classList.add("hidden");
});

document.querySelectorAll(".chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    selectedDuration = parseInt(chip.dataset.mins, 10);
  });
});

document.getElementById("btn-confirm-booking").addEventListener("click", async () => {
  const vnum = document.getElementById("bk-vnum").value.trim();
  if (!vnum) { showMsg("booking-msg", false, "Enter a vehicle number."); return; }
  const user = getUser();
  try {
    const data = await api("/api/bookings/book", "POST", {
      userId: user.userId,
      vehicleNumber: vnum,
      vehicleType: selectedType,
      slotId: pendingSlot.slotId,
      plannedMinutes: selectedDuration
    });
    activeBooking = data;
    document.getElementById("booking-overlay").classList.add("hidden");
    showReceipt("confirmation", data);
    refreshActiveStrip();
    loadSlots();
  } catch (err) {
    showMsg("booking-msg", false, err.message);
  }
});

/* ---------------- Checkout ---------------- */
document.getElementById("btn-end").addEventListener("click", async () => {
  if (!activeBooking) return;
  try {
    const data = await api(`/api/bookings/checkout/${activeBooking.bookingId}`, "POST");
    activeBooking = null;
    showReceipt("bill", data);
    refreshActiveStrip();
    loadSlots();
  } catch (err) {
    alert("Checkout failed: " + err.message);
  }
});

/* ---------------- Receipt rendering ---------------- */
function fmtDate(iso) {
  if (!iso) return "-";
  return new Date(iso).toLocaleString("en-IN", {
    day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit"
  });
}

function showReceipt(type, data) {
  const isBill = type === "bill";
  const headerClass = isBill ? "green" : "blue";
  const headerText = isBill ? "🧾 Parking Bill" : "✅ Parking Confirmed";

  let rows = `
    <tr><td>Vehicle Number</td><td>${data.vehicleNumber}</td></tr>
    <tr><td>Slot</td><td>${data.slotNumber}</td></tr>
    <tr><td>Entry Time</td><td>${fmtDate(data.entryTime)}</td></tr>
  `;
  if (isBill) {
    rows += `
      <tr><td>Exit Time</td><td>${fmtDate(data.exitTime)}</td></tr>
      <tr><td>Rate / Hour</td><td>₹${Number(data.ratePerHour).toFixed(2)}</td></tr>
      <tr class="total"><td>Total Amount</td><td>₹${Number(data.amount).toFixed(2)}</td></tr>
    `;
  } else if (data.plannedMinutes) {
    const h = Math.floor(data.plannedMinutes / 60), m = data.plannedMinutes % 60;
    rows += `<tr><td>Requested Duration</td><td>${h ? h + " hr " : ""}${m ? m + " min" : ""}</td></tr>`;
  }

  document.getElementById("receipt-content").innerHTML = `
    <div class="receipt-card">
      <div class="receipt-header ${headerClass}"><h2>${headerText}</h2></div>
      <div class="receipt-body">
        <p>Hi ${getUser()?.name || ""},</p>
        <table class="receipt-table">${rows}</table>
      </div>
    </div>
  `;
  document.getElementById("receipt-overlay").classList.remove("hidden");
}
document.getElementById("receipt-close").addEventListener("click", () => {
  document.getElementById("receipt-overlay").classList.add("hidden");
});
document.getElementById("receipt-done").addEventListener("click", () => {
  document.getElementById("receipt-overlay").classList.add("hidden");
});

/* ---------------- Init ---------------- */
if (getUser()) {
  enterDashboard();
}
